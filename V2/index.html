<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>刘昱君 · 暑假任务管家</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <div class="top-bar">
      <button id="prevDayBtn">←</button>
      <div class="date-info">
        <span id="displayDate"></span>
        <span id="displayWeekday"></span>
      </div>
      <button id="backTodayBtn">今天</button>
      <!-- ✅ 新增 -->
      <button id="addTaskTopBtn" class="add-task-top-btn">＋</button>
      <button id="nextDayBtn">→</button>
    </div>

    <div id="dailyViewPanel">
        <div class="date-navigation">
            <button class="nav-btn" id="prevDayBtn">←</button>
            <div class="date-header">
                <div class="date-main" id="displayDate">--</div>
                <div class="weekday" id="displayWeekday"></div>
            </div>
            <button class="nav-btn" id="nextDayBtn">→</button>
        </div>
        <div class="tasks-grid" id="tasksGrid">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <div id="overviewViewPanel" style="display: none;">
        <div class="overview-container" id="overviewContainer"></div>
    </div>
</div>
<!-- 相册查看器（iOS 风格） -->
<div id="galleryModal" class="modal-mask">
  <div id="galleryContainer" style="width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;touch-action:none;background:#000;overflow:hidden;">
    <div id="galleryTrack" style="display:flex;height:100%;transition:transform 0.3s ease;"></div>
  </div>
</div>
    
<!-- 添加任务模态框 -->
<div id="taskModal" class="modal-mask">
  <div class="modal-container">
    <h3>添加任务</h3>

    <input id="taskTitleInput" placeholder="任务内容" />

    <label>日期时间</label>
    <input id="taskDateTimeInput" type="datetime-local" />

    <label>重复规则</label>
    <select id="repeatSelect">
      <option value="once">不重复</option>
      <option value="daily">每天</option>
      <option value="weekly">每周</option>
    </select>

    <div class="modal-buttons">
      <button class="modal-btn" id="confirmAddBtn">确认</button>
      <button class="modal-btn" id="cancelModalBtn">取消</button>
    </div>
  </div>
</div>

<!-- 完成任务 - 上传媒体模态框 -->
<div id="completeTaskModal" class="modal-mask">
    <div class="modal-container" style="max-width: 480px;">
        <h3>📸 完成任务</h3>
        <p style="color:#b87a53; margin: 8px 0 16px; font-size:0.95rem;" id="completeTaskText">任务名称</p>
        <div style="border: 2px dashed #f0cfae; border-radius: 32px; padding: 24px; text-align: center; margin: 12px 0; background: #fefaf5;">
            <div id="mediaPreview" style="margin-bottom: 12px;">
                <div style="font-size: 3rem; color: #d99464;">📤</div>
                <p style="color: #b87a53; font-size: 0.9rem;">点击下方按钮上传照片或视频</p>
            </div>
            <input type="file" id="mediaFileInput" accept="image/*,video/*" multiple style="display: none;" />
            <button class="modal-btn" id="chooseMediaBtn" style="background: #d99464; color: white; padding: 12px 32px;">📁 选择文件</button>
            <button class="modal-btn" id="clearMediaBtn" style="background: #f0e0d0; padding: 12px 24px; margin-left: 8px;">清除</button>
        </div>
        <div style="font-size:0.8rem; color:#b48b65; margin-bottom: 8px;">📌 支持 JPG, PNG, GIF, MP4, MOV (最大 10MB)</div>
        <div class="modal-buttons">
            <button class="modal-btn" id="cancelCompleteBtn">取消</button>
            <button class="modal-btn confirm" id="confirmCompleteBtn">✅ 完成任务</button>
        </div>
    </div>
</div>

<!-- 查看媒体模态框 -->
<div id="viewMediaModal" class="modal-mask">
    <div class="modal-container" style="max-width: 500px; padding: 16px;">
        <div id="viewMediaContent" style="text-align: center;"></div>
        <div class="modal-buttons">
            <button class="modal-btn" id="closeMediaViewBtn">关闭</button>
        </div>
    </div>
</div>

<!-- 删除确认模态框 -->
<div id="deleteConfirmModal" class="modal-mask">
    <div class="modal-container warning-modal">
        <h3>🗑️ 删除任务</h3>
        <div id="deleteWarningMsg" class="warning-msg"></div>
        <div id="deleteDynamicButtons" class="modal-buttons warning-buttons"></div>
    </div>
</div>

<footer id="appFooter">✅ 单击卡片完成(需上传凭证) | 双击卡片删除 | 双击底部清理未来重复任务</footer>

<script src="app.js"></script>
</body>
</html>
